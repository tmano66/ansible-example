---
# Static inventory for the SFC data center host.
# Replaces the AWS EC2 dynamic inventory (aws_ec2.yml).
#
# TODO: fill in the real host details once you have them.
all:
  hosts:
    sfc_host:
      # Hostname or IP of the target node in the SFC data center.
      ansible_host: 91.239.86.79

      # User Ansible logs in as over SSH.
      ansible_user: ubuntu

      # The mounted file /mnt/workspace/id_ed25519 is world-readable, so SSH
      # ignores it. The before_init hook in .spacelift/config.yml copies it to
      # this private 0600 path. This inventory var overrides ANSIBLE_PRIVATE_KEY_FILE.
      ansible_ssh_private_key_file: /mnt/workspace/ssh_key

      # If the host listens on a non-standard SSH port, set it here.
      # ansible_port: 22
